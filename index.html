<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Apple</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<video id="video" controls autoplay loop>
    <source src="Bad_Apple_PV.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");

document.body.addEventListener("click", () => {
    video.play();
}, { once: true });
</script>

</body>
</html>
