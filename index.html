<title>Bad Apple</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

button{
    position:absolute;
    inset:0;
    font-size:2rem;
}
</style>
</head>
<body>

<button id="start">Start</button>

<video id="video" loop>
    <source src="Bad_Apple_PV.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
const start = document.getElementById("start");

start.onclick = async () => {
    start.style.display = "none";
    try {
        await video.play();
    } catch (e) {
        alert(e);
    }
};
</script>
